services:
  db:
    image: pgvector/pgvector:pg16
    container_name: soboksobok_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-edu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-soboksobok}
    ports:
      - "${LOCAL_DB_PORT:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: soboksobok_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-soboksobok}
      DB_USER: ${DB_USER:-edu}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      ATTACHMENT_DIR: ${ATTACHMENT_DIR:-/app/storage/attachments}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      # 챗봇 RAG (feat/19)
      CHAT_EMBEDDING_PROVIDER: ${CHAT_EMBEDDING_PROVIDER:-ollama}
      CHAT_EMBEDDING_MODEL: ${CHAT_EMBEDDING_MODEL:-bge-m3:latest}
      CHAT_CHUNK_SIZE: ${CHAT_CHUNK_SIZE:-280}
      CHAT_CHUNK_OVERLAP: ${CHAT_CHUNK_OVERLAP:-40}
      CHAT_RETRIEVAL_LIMIT: ${CHAT_RETRIEVAL_LIMIT:-6}
      CHAT_COMPLETION_PROVIDER: ${CHAT_COMPLETION_PROVIDER:-openai}
      CHAT_COMPLETION_MODEL: ${CHAT_COMPLETION_MODEL:-gpt-4o-mini}
      CHAT_MAX_CONTEXT_CHARS: ${CHAT_MAX_CONTEXT_CHARS:-4500}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-soboksobok-chatbot-rag}
      # 추천 (feat/4)
      REC_EMBEDDING_DIM: ${REC_EMBEDDING_DIM:-1024}
      REC_EMBEDDING_PROVIDER: ${REC_EMBEDDING_PROVIDER:-ollama}
      REC_OLLAMA_MODEL: ${REC_OLLAMA_MODEL:-bge-m3:latest}
      REC_OLLAMA_BASE_URL: ${REC_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      REC_OPENAI_MODEL: ${REC_OPENAI_MODEL:-text-embedding-3-small}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  crawler:
    build:
      context: ./backend
    container_name: soboksobok_crawler
    restart: unless-stopped
    command: python -m app.jobs.crawl_policy_sources_loop
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-soboksobok}
      DB_USER: ${DB_USER:-edu}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      CRAWL_INTERVAL_SECONDS: ${CRAWL_INTERVAL_SECONDS:-86400}
      SBIZ24_PAGE_SIZE: ${SBIZ24_PAGE_SIZE:-100}
      SBIZ24_REQUEST_DELAY_SECONDS: ${SBIZ24_REQUEST_DELAY_SECONDS:-1.0}
      SEMAS_SEED_URL: ${SEMAS_SEED_URL:-https://www.semas.or.kr/web/SUP01/SUP0122/SUP012201.kmdc}
      SEMAS_REQUEST_DELAY_SECONDS: ${SEMAS_REQUEST_DELAY_SECONDS:-1.0}
      GOV24_BASE_URL: ${GOV24_BASE_URL:-https://api.odcloud.kr/api}
      GOV24_SERVICE_KEY: ${GOV24_SERVICE_KEY:-}
      GOV24_SERVICE_LIST_USER_TYPE_LIKE: ${GOV24_SERVICE_LIST_USER_TYPE_LIKE:-소상공인}
      GOV24_PAGE_START: ${GOV24_PAGE_START:-1}
      GOV24_PAGE_SIZE: ${GOV24_PAGE_SIZE:-100}
      GOV24_MAX_PAGES: ${GOV24_MAX_PAGES:-200}
      GOV24_REQUEST_DELAY_SECONDS: ${GOV24_REQUEST_DELAY_SECONDS:-0.2}
      ATTACHMENT_DIR: ${ATTACHMENT_DIR:-/app/storage/attachments}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      CHAT_EMBEDDING_PROVIDER: ${CHAT_EMBEDDING_PROVIDER:-ollama}
      CHAT_EMBEDDING_MODEL: ${CHAT_EMBEDDING_MODEL:-bge-m3:latest}
      CHAT_CHUNK_SIZE: ${CHAT_CHUNK_SIZE:-280}
      CHAT_CHUNK_OVERLAP: ${CHAT_CHUNK_OVERLAP:-40}
      EMBED_CHAT_CHUNKS_AFTER_NORMALIZE: ${EMBED_CHAT_CHUNKS_AFTER_NORMALIZE:-true}
      REC_EMBEDDING_DIM: ${REC_EMBEDDING_DIM:-1024}
      REC_EMBEDDING_PROVIDER: ${REC_EMBEDDING_PROVIDER:-ollama}
      REC_OLLAMA_MODEL: ${REC_OLLAMA_MODEL:-bge-m3:latest}
      REC_OLLAMA_BASE_URL: ${REC_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      REC_OPENAI_MODEL: ${REC_OPENAI_MODEL:-text-embedding-3-small}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
