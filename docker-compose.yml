x-model-environment: &model-environment
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  CHAT_CLOUD_LLM_MODEL: ${CHAT_CLOUD_LLM_MODEL:-gpt-4o-mini}
  CHAT_LOCAL_LLM_MODEL: ${CHAT_LOCAL_LLM_MODEL:-exaone3.5}
  CHAT_ALLOW_EXTERNAL: ${CHAT_ALLOW_EXTERNAL:-true}
  CHAT_CLOUD_EMBEDDING_MODEL: ${CHAT_CLOUD_EMBEDDING_MODEL:-text-embedding-3-small}
  CHAT_CLOUD_EMBEDDING_DIMENSIONS: ${CHAT_CLOUD_EMBEDDING_DIMENSIONS:-1536}
  CHAT_LOCAL_EMBEDDING_MODEL: ${CHAT_LOCAL_EMBEDDING_MODEL:-bge-m3}
  CHAT_LOCAL_EMBEDDING_DIMENSIONS: ${CHAT_LOCAL_EMBEDDING_DIMENSIONS:-1024}
  RECOMMEND_CLOUD_LLM_MODEL: ${RECOMMEND_CLOUD_LLM_MODEL:-gpt-4o-mini}
  RECOMMEND_LOCAL_LLM_MODEL: ${RECOMMEND_LOCAL_LLM_MODEL:-exaone3.5}
  RECOMMEND_ALLOW_EXTERNAL: ${RECOMMEND_ALLOW_EXTERNAL:-true}
  RECOMMEND_CLOUD_EMBEDDING_MODEL: ${RECOMMEND_CLOUD_EMBEDDING_MODEL:-text-embedding-3-small}
  RECOMMEND_CLOUD_EMBEDDING_DIMENSIONS: ${RECOMMEND_CLOUD_EMBEDDING_DIMENSIONS:-1536}
  RECOMMEND_LOCAL_EMBEDDING_MODEL: ${RECOMMEND_LOCAL_EMBEDDING_MODEL:-bge-m3}
  RECOMMEND_LOCAL_EMBEDDING_DIMENSIONS: ${RECOMMEND_LOCAL_EMBEDDING_DIMENSIONS:-1024}
  POLICY_SUMMARY_CLOUD_LLM_MODEL: ${POLICY_SUMMARY_CLOUD_LLM_MODEL:-gpt-4o-mini}
  POLICY_SUMMARY_LOCAL_LLM_MODEL: ${POLICY_SUMMARY_LOCAL_LLM_MODEL:-exaone3.5}
  POLICY_SUMMARY_ALLOW_EXTERNAL: ${POLICY_SUMMARY_ALLOW_EXTERNAL:-true}
  NORMALIZATION_LLM_PROVIDER: ${NORMALIZATION_LLM_PROVIDER:-openai}
  NORMALIZATION_LLM_MODEL: ${NORMALIZATION_LLM_MODEL:-gpt-4o-mini}
  NORMALIZATION_ALLOW_EXTERNAL: ${NORMALIZATION_ALLOW_EXTERNAL:-true}
  DOCUMENT_REVIEW_CLOUD_LLM_MODEL: ${DOCUMENT_REVIEW_CLOUD_LLM_MODEL:-gpt-4o-mini}
  DOCUMENT_REVIEW_LOCAL_LLM_MODEL: ${DOCUMENT_REVIEW_LOCAL_LLM_MODEL:-exaone3.5}
  DOCUMENT_REVIEW_CLOUD_EMBEDDING_MODEL: ${DOCUMENT_REVIEW_CLOUD_EMBEDDING_MODEL:-text-embedding-3-small}
  DOCUMENT_REVIEW_CLOUD_EMBEDDING_DIMENSIONS: ${DOCUMENT_REVIEW_CLOUD_EMBEDDING_DIMENSIONS:-1536}
  DOCUMENT_REVIEW_LOCAL_EMBEDDING_MODEL: ${DOCUMENT_REVIEW_LOCAL_EMBEDDING_MODEL:-bge-m3}
  DOCUMENT_REVIEW_LOCAL_EMBEDDING_DIMENSIONS: ${DOCUMENT_REVIEW_LOCAL_EMBEDDING_DIMENSIONS:-1024}
  PREP_ALLOW_EXTERNAL: ${PREP_ALLOW_EXTERNAL:-true}
  PREP_CLOUD_EMBEDDING_MODEL: ${PREP_CLOUD_EMBEDDING_MODEL:-text-embedding-3-small}
  PREP_CLOUD_EMBEDDING_DIMENSIONS: ${PREP_CLOUD_EMBEDDING_DIMENSIONS:-1536}
  PREP_LOCAL_EMBEDDING_MODEL: ${PREP_LOCAL_EMBEDDING_MODEL:-bge-m3}
  PREP_LOCAL_EMBEDDING_DIMENSIONS: ${PREP_LOCAL_EMBEDDING_DIMENSIONS:-1024}
  REVIEW_LLM_TIMEOUT_SECONDS: ${REVIEW_LLM_TIMEOUT_SECONDS:-180}
  CALENDAR_COACH_CLOUD_LLM_MODEL: ${CALENDAR_COACH_CLOUD_LLM_MODEL:-gpt-4o-mini}
  CALENDAR_COACH_LOCAL_LLM_MODEL: ${CALENDAR_COACH_LOCAL_LLM_MODEL:-exaone3.5}
  CALENDAR_COACH_ALLOW_EXTERNAL: ${CALENDAR_COACH_ALLOW_EXTERNAL:-true}
  LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-60}
  LLM_EMBEDDING_TIMEOUT_SECONDS: ${LLM_EMBEDDING_TIMEOUT_SECONDS:-60}
  LLM_CALL_LOGGING_ENABLED: ${LLM_CALL_LOGGING_ENABLED:-true}
  LLM_LOG_LEVEL: ${LLM_LOG_LEVEL:-INFO}
  LLM_LOG_CONTENT: ${LLM_LOG_CONTENT:-false}
  LLM_LOG_PREVIEW_CHARS: ${LLM_LOG_PREVIEW_CHARS:-0}

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: soboksobok_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-edu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-soboksobok}
    ports:
      - "${LOCAL_DB_PORT:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: soboksobok_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *model-environment
      SERVICE_NAME: api
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-soboksobok}
      DB_USER: ${DB_USER:-edu}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      ATTACHMENT_DIR: ${ATTACHMENT_DIR:-/app/storage/attachments}
      # Google OAuth (feat/7)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # 챗봇 RAG (feat/19)
      CHAT_CHUNK_SIZE: ${CHAT_CHUNK_SIZE:-280}
      CHAT_CHUNK_OVERLAP: ${CHAT_CHUNK_OVERLAP:-40}
      CHAT_MIN_CHUNK_SIZE: ${CHAT_MIN_CHUNK_SIZE:-80}
      CHAT_NEIGHBOR_CHUNK_WINDOW: ${CHAT_NEIGHBOR_CHUNK_WINDOW:-1}
      CHAT_RETRIEVAL_LIMIT: ${CHAT_RETRIEVAL_LIMIT:-6}
      CHAT_MAX_CONTEXT_CHARS: ${CHAT_MAX_CONTEXT_CHARS:-4500}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  crawler:
    build:
      context: ./backend
    container_name: soboksobok_crawler
    restart: unless-stopped
    command: python -m app.jobs.crawl_policy_sources_loop
    environment:
      <<: *model-environment
      SERVICE_NAME: crawler
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-soboksobok}
      DB_USER: ${DB_USER:-edu}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      CRAWL_INTERVAL_SECONDS: ${CRAWL_INTERVAL_SECONDS:-86400}
      SBIZ24_PAGE_SIZE: ${SBIZ24_PAGE_SIZE:-100}
      SBIZ24_REQUEST_DELAY_SECONDS: ${SBIZ24_REQUEST_DELAY_SECONDS:-1.0}
      SEMAS_SEED_URL: ${SEMAS_SEED_URL:-https://www.semas.or.kr/web/SUP01/SUP0122/SUP012201.kmdc}
      SEMAS_REQUEST_DELAY_SECONDS: ${SEMAS_REQUEST_DELAY_SECONDS:-1.0}
      GOV24_BASE_URL: ${GOV24_BASE_URL:-https://api.odcloud.kr/api}
      GOV24_SERVICE_KEY: ${GOV24_SERVICE_KEY:-}
      GOV24_SERVICE_LIST_USER_TYPE_LIKE: ${GOV24_SERVICE_LIST_USER_TYPE_LIKE:-소상공인}
      GOV24_PAGE_START: ${GOV24_PAGE_START:-1}
      GOV24_PAGE_SIZE: ${GOV24_PAGE_SIZE:-100}
      GOV24_MAX_PAGES: ${GOV24_MAX_PAGES:-200}
      GOV24_REQUEST_DELAY_SECONDS: ${GOV24_REQUEST_DELAY_SECONDS:-0.2}
      ATTACHMENT_DIR: ${ATTACHMENT_DIR:-/app/storage/attachments}
      CHAT_CHUNK_SIZE: ${CHAT_CHUNK_SIZE:-280}
      CHAT_CHUNK_OVERLAP: ${CHAT_CHUNK_OVERLAP:-40}
      CHAT_MIN_CHUNK_SIZE: ${CHAT_MIN_CHUNK_SIZE:-80}
      CHAT_NEIGHBOR_CHUNK_WINDOW: ${CHAT_NEIGHBOR_CHUNK_WINDOW:-1}
      EMBED_CHAT_CHUNKS_AFTER_NORMALIZE: ${EMBED_CHAT_CHUNKS_AFTER_NORMALIZE:-true}
      NORMALIZE_LLM_TIMEOUT_SECONDS: ${NORMALIZE_LLM_TIMEOUT_SECONDS:-30}
      NORMALIZE_LLM_MAX_CONTEXT_CHARS: ${NORMALIZE_LLM_MAX_CONTEXT_CHARS:-800}
    volumes:
      - ./backend/storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: soboksobok_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:

